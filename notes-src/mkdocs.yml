site_name: Notes de Martin
site_description: Notes personnelles et professionnelles
site_url: https://martin-tav.github.io/notes/
use_directory_urls: true

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Basculer en mode sombre
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Basculer en mode clair
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Accueil: index.md
  - Réflexions:
    - IA réflexion (06/07/2026): reflexions/2026-07-06-ia-reflexion.md
    - Claude Cowork takeaways (06/07/2026): reflexions/2026-07-06-claude-cowork-takeaways.md
  - Formations:
    - Claude Cowork - Quiz prep (06/07/2026): formations/2026-07-06-claude-cowork-quiz-prep.md
  - Exemple: exemple/premiere-note.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - def_list

plugins:
  - search

extra:
  generator: false


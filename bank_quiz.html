<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bank Training – Quiz de révision</title>
<style>
  :root {
    --bg: #f4f3ef;
    --card: #f7f7f5;
    --card-white: #ffffff;
    --border: #e6e4dd;
    --text-primary: #111111;
    --text-secondary: #555555;
    --text-tertiary: #8a8a8d;
    --accent: #185fa5;
    --accent-dark: #0c447c;
    --accent-bg: #e6f1fb;
    --success: #1d9e75;
    --success-bg: #e1f5ee;
    --warning: #ff9800;
    --warning-bg: #fff3e0;
    --error: #c0392b;
    --error-bg: #ffebee;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 16px 80px 16px;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
  }
  .wrap { max-width: 600px; width: 100%; }

  /* Header, style e-mail */
  .avatar {
    width: 48px; height: 48px; border-radius: 24px;
    background: #000; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin: 0 auto 20px auto;
  }
  h1 {
    margin: 0 0 8px 0; text-align: center;
    font-size: 30px; font-weight: 600; letter-spacing: -0.3px; color: #000;
  }
  .subtitle {
    margin: 0 0 6px 0; text-align: center;
    color: var(--text-secondary); font-size: 15px; font-weight: 500;
  }
  .meta {
    margin: 0 0 28px 0; text-align: center;
    color: var(--text-tertiary); font-size: 13px;
  }
  .intro-box {
    background: var(--accent-bg);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 28px;
  }
  .intro-box .emoji { font-size: 40px; line-height: 1; margin-bottom: 8px; }
  .intro-box .label { font-size: 14px; font-weight: 600; color: var(--accent-dark); }

  /* Category selection */
  .cat-grid {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    margin-bottom: 24px;
  }
  .cat-btn {
    border: none; border-radius: 24px; color: #fff;
    font-size: 14px; font-weight: 600;
    padding: 13px 22px; cursor: pointer;
    font-family: inherit;
  }
  .cat-btn:hover { opacity: 0.9; }
  .cat-btn .cat-count {
    font-weight: 400; opacity: 0.85; font-size: 12px;
  }
  .cat-all { background: #111111; }

  .back-link {
    display: block; text-align: center; margin: 0 0 18px 0;
    font-size: 13px; color: var(--accent); cursor: pointer;
    font-weight: 600; text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }

  .current-cat {
    text-align: center; margin: 0 0 18px 0;
  }
  .current-cat .pill {
    display: inline-block; border-radius: 20px; padding: 8px 18px;
    font-size: 13px; font-weight: 600; color: #fff;
  }

  /* Sticky live score bar */
  .live-bar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); padding: 0 0 12px 0; margin-bottom: 6px;
  }
  .live-inner {
    background: var(--card-white);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; color: var(--text-secondary);
  }
  .live-inner strong { color: var(--text-primary); }
  .progress-container {
    width: 100%; background: var(--border); border-radius: 3px;
    margin-top: 8px; height: 6px;
  }
  .progress-bar {
    height: 100%; background: var(--accent); border-radius: 3px;
    width: 0%; transition: width 0.3s ease;
  }

  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 22px 22px 20px 22px;
    margin-bottom: 14px;
    scroll-margin-top: 70px;
  }
  .card.correct-card { background: var(--success-bg); }
  .card.incorrect-card { background: var(--error-bg); }

  .card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; flex-wrap: wrap; gap: 6px;
  }
  .topic {
    display: inline-block; font-size: 12px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px;
  }
  .topic[data-topic="Organisation LCL"] { background: #d6ebff; color: #0066cc; }
  .topic[data-topic="Produits phares"] { background: #d9f5ea; color: #128a5e; }
  .topic[data-topic="Bâle III"] { background: #ffe9d6; color: #cc6600; }
  .topic[data-topic="DORA"] { background: #f2ddff; color: #800080; }
  .topic[data-topic="LCB-FT"] { background: #d6fbf5; color: #00807a; }
  .topic[data-topic="RGPD bancaire"] { background: #ffd9e6; color: #cc0055; }

  .qcount { font-size: 12px; color: var(--text-tertiary); }
  .qtype {
    font-size: 11px; color: var(--text-tertiary);
    border: 0.5px solid var(--border); border-radius: 20px;
    padding: 2px 10px; background: var(--card-white);
  }
  .question { font-size: 16px; font-weight: 700; margin: 0 0 6px 0; line-height: 1.5; }
  .hint {
    font-size: 13px; color: var(--text-tertiary); font-style: italic;
    margin: 0 0 10px 0; display: none;
  }

  .center-row { display: flex; justify-content: center; }

  .hint-btn {
    border: none; border-radius: 20px; background: var(--warning-bg); color: #a35800;
    font-size: 13px; font-weight: 600; padding: 8px 16px; cursor: pointer;
    font-family: inherit; margin: 0 0 12px 0;
  }
  .hint-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Feedback + explanation + context: positioned before the answer choices */
  .feedback {
    font-size: 13px; font-weight: 600; padding: 8px 14px;
    border-radius: 20px; margin: 0 0 8px 0; display: none;
    width: fit-content;
  }
  .feedback.correct { background: var(--success); color: #fff; display: inline-block; }
  .feedback.incorrect { background: var(--error); color: #fff; display: inline-block; }
  .explanation {
    font-size: 14px; color: var(--text-secondary); line-height: 1.6;
    margin: 0 0 8px 0; display: none;
    background: var(--card-white); border-radius: 12px; padding: 12px 14px;
  }
  .context {
    font-size: 12px; color: var(--text-tertiary); line-height: 1.55;
    margin: 0 0 16px 0; display: none;
    padding: 0 14px;
    font-style: italic;
  }
  .context .label {
    font-weight: 700; font-style: normal; text-transform: uppercase;
    letter-spacing: 0.3px; margin-right: 4px;
  }

  /* QCM options: centered pill cluster */
  .options {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    margin-bottom: 4px;
  }
  .option-btn {
    font-family: inherit; font-size: 14px; font-weight: 600;
    text-align: center; padding: 10px 18px;
    border-radius: 20px; border: 1.5px solid #d8d6cd;
    background: #fff; color: var(--text-primary);
    cursor: pointer;
  }
  .option-btn:hover:not(:disabled) { background: #f0efe9; }
  .option-btn:disabled { cursor: not-allowed; }
  .option-btn.correct { background: var(--success); border-color: var(--success); color: #fff; }
  .option-btn.incorrect { background: var(--error); border-color: var(--error); color: #fff; }
  .option-btn.dim { opacity: 0.4; }

  /* Fill-in: centered */
  .fill-col {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    margin-bottom: 4px;
  }
  .fill-input {
    width: 100%; max-width: 280px;
    font-family: inherit; font-size: 15px; text-align: center;
    padding: 10px 14px; border-radius: 20px;
    border: 1.5px solid #d8d6cd; background: #fff; color: var(--text-primary);
  }
  .fill-input:focus { outline: 2px solid var(--accent); }
  .fill-input.correct { border-color: var(--success); background: var(--success-bg); }
  .fill-input.incorrect { border-color: var(--error); background: var(--error-bg); }
  .submit-btn {
    border: none; border-radius: 20px; background: var(--accent); color: #fff;
    font-size: 14px; font-weight: 600; padding: 10px 22px; cursor: pointer;
    font-family: inherit;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .expected {
    font-size: 13px; color: var(--text-secondary); text-align: center;
  }

  .summary {
    background: var(--card-white);
    border-radius: 18px;
    padding: 28px 22px;
    text-align: center;
    display: none;
  }
  .score { font-size: 32px; font-weight: 700; margin: 8px 0 20px 0; }
  .topic-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; padding: 10px 0; border-top: 0.5px solid var(--border);
    text-align: left;
  }
  .topic-row .bar-container {
    width: 100px; height: 8px; background: var(--border);
    border-radius: 5px; margin-left: 10px;
  }
  .topic-row .bar { height: 100%; border-radius: 5px; }
  .summary-actions {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    margin-top: 22px;
  }
  .summary-actions button {
    border: none; border-radius: 20px; font-size: 14px; font-weight: 600;
    padding: 10px 20px; cursor: pointer; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--bg); color: var(--text-primary); border: 1px solid var(--border) !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar">🏦</div>
  <h1>Quiz de révision</h1>
  <p class="subtitle">Bank training</p>
  <p class="meta">Organisation LCL · Produits phares · Bâle III · DORA · LCB-FT · RGPD bancaire</p>

  <div id="screen-category">
    <div class="intro-box">
      <div class="emoji">🎯</div>
      <div class="label">Choisis une catégorie pour commencer</div>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div id="screen-quiz" style="display:none">
    <div class="current-cat" id="current-cat"></div>
    <a class="back-link" id="back-link">← Changer de catégorie</a>

    <div class="live-bar">
      <div class="live-inner">
        <span>Répondues : <strong id="answered-count">0</strong>/<span id="total-count">0</span></span>
        <span>Correctes : <strong id="correct-count">0</strong></span>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
      </div>
    </div>

    <div id="quiz"></div>
    <div id="summary" class="summary"></div>
  </div>
</div>

<script>
const allQuestions = [
  {
    topic: "Organisation LCL", type: "qcm",
    q: "Qui est le directeur général de LCL depuis janvier 2024 ?",
    options: ["Serge Magdeleine", "Jérôme Grivet", "Philippe Brassac", "Xavier Musca"],
    correct: 0,
    explanation: "Serge Magdeleine est directeur général depuis janvier 2024. Jérôme Grivet est Président depuis avril 2025 (il est aussi directeur général délégué de Crédit Agricole SA).",
    context: "LCL est l'héritier du Crédit Lyonnais, fondé en 1863 et racheté par le groupe Crédit Agricole en 2003 ; la marque a été renommée LCL en 2005. Repère utile en entretien : connaître le duo DG/Président montre que tu maîtrises la gouvernance actuelle, pas seulement l'historique de la marque.",
    hint: "Le DG a un prénom commençant par 'S'."
  },
  {
    topic: "Organisation LCL", type: "qcm",
    q: "À quelle division du groupe Crédit Agricole LCL est-il rattaché ?",
    options: ["Banques universelles de proximité", "Grandes clientèles", "Banque de financement et d'investissement", "Gestion d'actifs et assurances"],
    correct: 0,
    explanation: "La division Banques universelles de proximité, aux côtés de Crédit Agricole Italia.",
    context: "Une 'banque universelle' combine sous un même toit la banque de détail, l'assurance et la gestion d'actifs, par opposition à une banque spécialisée. Cette organisation en grandes divisions (proximité, grandes clientèles, gestion d'actifs et assurances, BFI) est typique des grands groupes bancaires français comme BNP Paribas ou Société Générale.",
    hint: "C'est une division axée sur les banques 'universelles'."
  },
  {
    topic: "Organisation LCL", type: "qcm",
    q: "Quelle filiale de LCL est spécialisée dans le financement des professions libérales ?",
    options: ["Interfimo", "Angle Neuf", "Predica", "Amundi"],
    correct: 0,
    explanation: "Interfimo finance les professions libérales. Angle Neuf est spécialisée dans l'immobilier patrimonial neuf, aux côtés de LCL Banque privée pour la gestion de fortune.",
    context: "Interfimo est historiquement liée au financement de l'installation des professions médicales et juridiques (rachats de cabinets, de patientèle). Ce type de filiale 'de niche' est fréquent dans les groupes bancaires pour capter une clientèle à fort potentiel dès le début de sa carrière.",
    hint: "Le nom commence par 'I'."
  },
  {
    topic: "Organisation LCL", type: "qcm",
    q: "LCL est filiale à 100 % de quelle entité au sein du groupe Crédit Agricole ?",
    options: ["Crédit Agricole S.A.", "BNP Paribas", "Société Générale", "Groupe BPCE"],
    correct: 0,
    explanation: "Crédit Agricole S.A. est la structure cotée qui coiffe les activités de banque de détail hors Caisses régionales, dont la division Banques universelles de proximité.",
    context: "Fait notable pour comprendre la gouvernance du groupe : Crédit Agricole S.A. (CASA), bien que cotée en bourse, est elle-même majoritairement détenue par les Caisses régionales via la holding SAS Rue La Boétie — une structure mutualiste assez unique parmi les grandes banques françaises.",
    hint: "C'est la maison mère cotée en bourse du groupe."
  },
  {
    topic: "Produits phares", type: "qcm",
    q: "Quelle offre LCL est fixe à 2 euros par mois ?",
    options: ["LCL Essentiel", "LCL à la carte", "LCL Premium", "LCL Élite"],
    correct: 0,
    explanation: "LCL Essentiel est une offre d'entrée de gamme fixe à 2 euros par mois. LCL à la carte, dès 3,75 euros par mois, se module selon les services souscrits, avec des réductions si on en prend davantage.",
    context: "Ce type d'offre d'entrée de gamme répond à la pression concurrentielle des banques en ligne et néobanques (Boursorama, Fortuneo, Revolut), qui proposent souvent des comptes gratuits ou low-cost. Les grandes banques traditionnelles s'en servent pour retenir une clientèle jeune ou peu équipée avant de proposer des offres plus complètes.",
    hint: "L'autre offre est modulable, celle-ci est fixe."
  },
  {
    topic: "Produits phares", type: "fill",
    q: "Quel livret réglementé offre le meilleur taux net en 2026 pour les foyers éligibles ? (sigle)",
    accepted: ["lep", "livret d'epargne populaire", "livret epargne populaire"],
    explanation: "Le LEP (Livret d'épargne populaire), rémunéré à 2,5 % net en 2026, réservé aux foyers modestes.",
    context: "Le LEP est soumis à des conditions de ressources (revenu fiscal de référence) et à un plafond de dépôt inférieur à celui du Livret A. Il est historiquement sous-souscrit par rapport au nombre de foyers éligibles, ce qui en fait un sujet régulier de communication pour les conseillers bancaires et les pouvoirs publics.",
    hint: "C'est un livret pour les foyers modestes, en 3 lettres."
  },
  {
    topic: "Produits phares", type: "qcm",
    q: "Quel est le plafond du crédit FLEX chez LCL ?",
    options: ["2 000 €", "5 000 €", "500 €", "10 000 €"],
    correct: 0,
    explanation: "Le crédit FLEX est un crédit instantané plafonné à 2 000 euros, remboursable en trois fois.",
    context: "Ce format de micro-crédit instantané fait écho à la vague des solutions 'Buy Now, Pay Later' (Klarna, Alma) qui a poussé les banques traditionnelles à proposer leurs propres alternatives rapides, intégrées à l'espace client, plutôt que de laisser ce terrain aux fintechs.",
    hint: "C'est un crédit 'instantané', remboursable en 3 fois."
  },
  {
    topic: "Produits phares", type: "fill",
    q: "Quel assureur du groupe Crédit Agricole porte le contrat LCL Vie ?",
    accepted: ["predica", "prédica"],
    explanation: "LCL Vie est un contrat multisupport assuré par Prédica (Crédit Agricole Assurances). L'adhésion est possible dès 50 euros de versement initial, ou 15 euros par mois en versements programmés.",
    context: "Prédica est l'un des tout premiers assureurs-vie de France en encours. Elle fait partie de Crédit Agricole Assurances (CAA), qui regroupe aussi Pacifica (assurance dommages). Le distributeur (LCL) et l'assureur (Prédica) sont deux entités juridiques distinctes du même groupe, une architecture classique en bancassurance.",
    hint: "L'assureur du groupe commence par 'Pré...'."
  },
  {
    topic: "Produits phares", type: "qcm",
    q: "À partir de quel montant de patrimoine financier peut-on accéder à un accompagnement structuré de LCL Banque Privée ?",
    options: ["150 000 €", "50 000 €", "500 000 €", "1 000 000 €"],
    correct: 0,
    explanation: "Dès 150 000 euros d'avoirs en compte-titres, PEA ou PEA-PME. La gestion sous mandat est techniquement accessible dès 20 000 euros, mais sans rattachement à un pôle dédié.",
    context: "Au-delà d'environ 1 million d'euros de patrimoine financier, la clientèle bascule généralement vers Indosuez Wealth Management, la structure du groupe Crédit Agricole dédiée aux clientèles fortunées et internationales, avec une architecture de gestion plus ouverte.",
    hint: "Le seuil se situe entre 100 000 et 200 000 euros."
  },
  {
    topic: "Bâle III", type: "qcm",
    q: "Quel est le seuil plancher de CET1 sous Bâle III (part des actifs pondérés du risque) ?",
    options: ["4,5 %", "8 %", "2 %", "10 %"],
    correct: 0,
    explanation: "CET1 = Common Equity Tier 1, le capital de meilleure qualité. Le plancher est de 4,5 % des actifs pondérés du risque (8 % tous fonds propres confondus, jusqu'à 13 % avec les coussins).",
    context: "Bâle III a été négocié par le Comité de Bâle sur le contrôle bancaire à la suite de la crise financière de 2008, puis transposé en droit européen via les textes CRR/CRD. Au-delà du plancher réglementaire, les régulateurs ajoutent des 'coussins' de fonds propres (coussin de conservation, contracyclique, systémique) qui peuvent porter l'exigence totale jusqu'à 13 % environ pour les grandes banques.",
    hint: "C'est le capital de 'meilleure qualité', seuil le plus bas des trois."
  },
  {
    topic: "Bâle III", type: "qcm",
    q: "Que mesure le LCR (Liquidity Coverage Ratio) ?",
    options: [
      "La capacité à couvrir 30 jours de sorties de trésorerie avec des actifs facilement cessibles",
      "Le niveau de fonds propres par rapport aux risques",
      "Le taux de couverture des prêts par des dépôts",
      "Le ratio de levier bancaire"
    ],
    correct: 0,
    explanation: "Il a été introduit car des banques solvables sur le papier se sont retrouvées incapables d'honorer leurs échéances du jour au lendemain en 2008.",
    context: "Le LCR est complété par le NSFR (Net Stable Funding Ratio), qui mesure la stabilité du financement à plus long terme (au-delà d'un an). Ensemble, ils forment le volet 'liquidité' de Bâle III, distinct du volet 'solvabilité' porté par le CET1. Mnémotechnique fréquente : LCR = liquidité courte (30 jours), NSFR = financement stable (long terme).",
    hint: "C'est un ratio de 'liquidité'."
  },
  {
    topic: "DORA", type: "fill",
    q: "Depuis quelle date DORA est-il en application ? (format JJ/MM/AAAA)",
    accepted: ["17/01/2025", "17012025", "17-01-2025", "17 janvier 2025"],
    explanation: "Depuis le 17 janvier 2025. Le conseil d'administration porte désormais la responsabilité du risque informatique, plus seulement la DSI.",
    context: "DORA (Digital Operational Resilience Act) est un règlement européen qui s'inscrit dans le paquet 'finance numérique' de la Commission européenne, aux côtés de MiCA (règlement sur les crypto-actifs). Il s'applique directement dans tous les États membres, sans transposition nationale nécessaire, contrairement à une directive.",
    hint: "La date commence par '17/01/'."
  },
  {
    topic: "DORA", type: "qcm",
    q: "Quelle échéance DORA impose-t-il pour remettre un registre des contrats avec les prestataires TIC ?",
    options: ["31 mars 2026", "31 décembre 2025", "30 juin 2026", "17 janvier 2026"],
    correct: 0,
    explanation: "Les autres chantiers concrets imposés par DORA à une DSI bancaire : cartographier en continu les actifs informatiques critiques, et déclarer les incidents majeurs selon une procédure harmonisée.",
    context: "Ce registre des prestataires TIC répond à une préoccupation majeure des régulateurs : le risque de concentration technologique, notamment vis-à-vis des grands fournisseurs de cloud (AWS, Microsoft Azure, Google Cloud). DORA prévoit d'ailleurs la désignation de 'prestataires TIC critiques' soumis à une supervision directe au niveau européen.",
    hint: "C'est au premier trimestre 2026."
  },
  {
    topic: "LCB-FT", type: "qcm",
    q: "Que signifie le sigle LCB-FT ?",
    options: [
      "Lutte Contre le Blanchiment et le Financement du Terrorisme",
      "Loi de Contrôle Bancaire et Fiscal Territorial",
      "Ligue de Coopération Bancaire Franco-Tunisienne",
      "Label de Conformité Bancaire et Financière"
    ],
    correct: 0,
    explanation: "L'objectif : identifier les clients (KYC), détecter les opérations suspectes et les déclarer à Tracfin.",
    context: "L'équivalent international du LCB-FT est souvent désigné AML/CFT (Anti-Money Laundering / Combating the Financing of Terrorism). Le cadre français s'appuie sur les recommandations du GAFI (Groupe d'Action Financière), l'organisme intergouvernemental qui fixe les standards mondiaux en la matière.",
    hint: "Les deux mots clés sont 'blanchiment' et 'terrorisme'."
  },
  {
    topic: "LCB-FT", type: "qcm",
    q: "Que signifie KYC ?",
    options: ["Know Your Customer", "Keep Your Credentials", "Know Your Compliance", "Key Yield Calculation"],
    correct: 0,
    explanation: "KYC = vérification de l'identité et du profil de risque du client. Cela s'applique dès l'entrée en relation d'affaires, puis en continu dans le cadre d'une vigilance constante.",
    context: "Le KYC s'est décliné en plusieurs variantes selon le contexte : eKYC pour la vérification d'identité à distance (souvent avec reconnaissance faciale), et KYB (Know Your Business) pour la vérification des clients personnes morales, avec identification de leurs bénéficiaires effectifs.",
    hint: "Littéralement 'connais ton client'."
  },
  {
    topic: "LCB-FT", type: "qcm",
    q: "Quel régulateur supervise le dispositif LCB-FT des banques françaises ?",
    options: ["ACPR", "AMF", "CNIL", "Banque Centrale Européenne"],
    correct: 0,

const topicColors = {
  "Organisation LCL": "#0066cc",
  "Produits phares": "#128a5e",
  "Bâle III": "#cc6600",
  "DORA": "#800080",
  "LCB-FT": "#00807a",
  "RGPD bancaire": "#cc0055"
};

function normalize(str) {
  return str
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[’']/g, "'")
    .trim()
    .replace(/\s+/g, " ");
}

function shuffleArray(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

let questions = [];   // sous-ensemble de allQuestions actuellement joué
let results = [];

const screenCategory = document.getElementById("screen-category");
const screenQuiz = document.getElementById("screen-quiz");
const quizEl = document.getElementById("quiz");
const summaryEl = document.getElementById("summary");

function buildCategoryScreen() {
  const topics = [...new Set(allQuestions.map(q => q.topic))];
  const grid = document.getElementById("cat-grid");
  const allBtn = `<button class="cat-btn cat-all" data-topic="__ALL__">Toutes les catégories <span class="cat-count">(${allQuestions.length})</span></button>`;
  const topicBtns = topics.map(t => {
    const count = allQuestions.filter(q => q.topic === t).length;
    return `<button class="cat-btn" data-topic="${t}" style="background:${topicColors[t]}">${t} <span class="cat-count">(${count})</span></button>`;
  }).join("");
  grid.innerHTML = allBtn + topicBtns;

  grid.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => startQuiz(btn.dataset.topic));
  });
}

function startQuiz(topicKey) {
  questions = topicKey === "__ALL__"
    ? shuffleArray(allQuestions)
    : shuffleArray(allQuestions.filter(q => q.topic === topicKey));

  const currentCatEl = document.getElementById("current-cat");
  if (topicKey === "__ALL__") {
    currentCatEl.innerHTML = `<span class="pill" style="background:#111111">Toutes les catégories</span>`;
  } else {
    currentCatEl.innerHTML = `<span class="pill" style="background:${topicColors[topicKey]}">${topicKey}</span>`;
  }

  screenCategory.style.display = "none";
  screenQuiz.style.display = "block";
  document.getElementById("total-count").textContent = questions.length;
  renderAll();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("back-link").addEventListener("click", () => {
  screenQuiz.style.display = "none";
  screenCategory.style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
});

function cardHtml(item, idx) {
  const typeLabel = item.type === "qcm" ? "QCM" : "À compléter";
  let bodyHtml = "";
  if (item.type === "qcm") {
    bodyHtml = `
      <div class="options" id="options-${idx}">
        ${item.options.map((opt, oidx) => `
          <button class="option-btn" data-qidx="${idx}" data-oidx="${oidx}">${opt}</button>
        `).join("")}
      </div>
    `;
  } else {
    bodyHtml = `
      <div class="fill-col">
        <input type="text" class="fill-input" id="fill-${idx}" placeholder="Ta réponse..." autocomplete="off">
        <button class="submit-btn" id="submit-${idx}" data-qidx="${idx}">Valider</button>
      </div>
    `;
  }
  return `
    <div class="card" id="card-${idx}">
      <div class="card-top">
        <span class="topic" data-topic="${item.topic}">${item.topic}</span>
        <span class="qcount">Question ${idx + 1}/${questions.length}</span>
        <span class="qtype">${typeLabel}</span>
      </div>
      <p class="question">${item.q}</p>
      <p class="hint" id="hint-${idx}">💡 ${item.hint}</p>
      <div class="center-row">
        <button class="hint-btn" id="hint-btn-${idx}">Voir l'indice</button>
      </div>
      <p class="feedback" id="feedback-${idx}"></p>
      <p class="explanation" id="explanation-${idx}">${item.explanation}</p>
      <p class="context" id="context-${idx}"><span class="label">Contexte</span>${item.context}</p>
      ${bodyHtml}
    </div>
  `;
}

function renderAll() {
  results = new Array(questions.length).fill(null);
  quizEl.innerHTML = questions.map((item, idx) => cardHtml(item, idx)).join("");
  summaryEl.style.display = "none";
  quizEl.style.display = "block";

  questions.forEach((item, idx) => {
    document.getElementById(`hint-btn-${idx}`).addEventListener("click", () => {
      document.getElementById(`hint-${idx}`).style.display = "block";
      document.getElementById(`hint-btn-${idx}`).disabled = true;
    });

    if (item.type === "qcm") {
      document.querySelectorAll(`#options-${idx} .option-btn`).forEach(btn => {
        btn.addEventListener("click", () => {
          if (results[idx] !== null) return;
          const oidx = parseInt(btn.dataset.oidx);
          submitQcm(idx, oidx);
        });
      });
    } else {
      const input = document.getElementById(`fill-${idx}`);
      const submitBtn = document.getElementById(`submit-${idx}`);
      submitBtn.addEventListener("click", () => {
        if (results[idx] !== null) return;
        submitFill(idx);
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && results[idx] === null) submitFill(idx);
      });
    }
  });

  updateLiveBar();
}

function submitQcm(idx, oidx) {
  const item = questions[idx];
  const isCorrect = oidx === item.correct;
  document.querySelectorAll(`#options-${idx} .option-btn`).forEach((btn) => {
    const bIdx = parseInt(btn.dataset.oidx);
    btn.disabled = true;
    if (bIdx === item.correct) btn.classList.add("correct");
    else if (bIdx === oidx) btn.classList.add("incorrect");
    else btn.classList.add("dim");
  });
  finishAnswer(idx, isCorrect);
}

function submitFill(idx) {
  const item = questions[idx];
  const input = document.getElementById(`fill-${idx}`);
  const val = normalize(input.value);
  const isCorrect = val.length > 0 && item.accepted.some(a => normalize(a) === val);
  input.disabled = true;
  input.classList.add(isCorrect ? "correct" : "incorrect");
  document.getElementById(`submit-${idx}`).disabled = true;
  if (!isCorrect) {
    input.insertAdjacentHTML("afterend", `<span class="expected">Réponse attendue : <strong>${item.accepted[0]}</strong></span>`);
  }
  finishAnswer(idx, isCorrect);
}

function finishAnswer(idx, isCorrect) {
  results[idx] = isCorrect;
  const feedback = document.getElementById(`feedback-${idx}`);
  feedback.classList.add(isCorrect ? "correct" : "incorrect");
  feedback.textContent = isCorrect ? "Bonne réponse ✅" : "Pas tout à fait ❌";
  document.getElementById(`explanation-${idx}`).style.display = "block";
  document.getElementById(`context-${idx}`).style.display = "block";
  document.getElementById(`hint-btn-${idx}`).style.display = "none";
  document.getElementById(`card-${idx}`).classList.add(isCorrect ? "correct-card" : "incorrect-card");

  updateLiveBar();
  if (results.every(r => r !== null)) {
    showSummary();
  }
}

function updateLiveBar() {
  const answeredCount = results.filter(r => r !== null).length;
  const correctCount = results.filter(r => r === true).length;
  document.getElementById("answered-count").textContent = answeredCount;
  document.getElementById("correct-count").textContent = correctCount;
  document.getElementById("progress").style.width = `${(answeredCount / questions.length) * 100}%`;
}

function showSummary() {
  const total = results.filter(r => r === true).length;
  const byTopic = {};
  questions.forEach((q, idx) => {
    byTopic[q.topic] = byTopic[q.topic] || { ok: 0, tot: 0 };
    byTopic[q.topic].tot += 1;
    byTopic[q.topic].ok += results[idx] ? 1 : 0;
  });

  const rows = Object.entries(byTopic).map(([t, v]) => {
    const percent = (v.ok / v.tot) * 100;
    return `
      <div class="topic-row">
        <span>${t}</span>
        <span>${v.ok}/${v.tot}</span>
        <div class="bar-container">
          <div class="bar" style="width: ${percent}%; background: ${topicColors[t]};"></div>
        </div>
      </div>
    `;
  }).join("");

  summaryEl.style.display = "block";
  summaryEl.innerHTML = `
    <p style="font-size:13px;color:var(--text-tertiary);margin:0;font-weight:600;">Score final</p>
    <p class="score">${total}/${questions.length}</p>
    <div style="text-align:left;">
      <p style="font-size:14px;color:var(--text-secondary);margin:0 0 6px 0;">Répartition par thème</p>
      ${rows}
    </div>
    <div class="summary-actions">
      <button class="btn-primary" id="restart">Recommencer</button>
      <button class="btn-secondary" id="shuffle">Mélanger et recommencer</button>
      <button class="btn-secondary" id="change-cat">Changer de catégorie</button>
    </div>
  `;
  summaryEl.scrollIntoView({ behavior: "smooth", block: "start" });

  document.getElementById("restart").addEventListener("click", renderAll);
  document.getElementById("shuffle").addEventListener("click", () => {
    questions = shuffleArray(questions);
    renderAll();
  });
  document.getElementById("change-cat").addEventListener("click", () => {
    screenQuiz.style.display = "none";
    screenCategory.style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

// Initialize
buildCategoryScreen();
</script>
</body>
</html>
